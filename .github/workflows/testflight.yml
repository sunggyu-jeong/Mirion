name: iOS TestFlight / App Store Deploy

on:
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      lane:
        description: 'beta = Dev(TestFlight), release = Prod(App Store)'
        required: true
        default: 'beta'
        type: choice
        options:
          - beta
          - release

concurrency:
  group: ios-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy iOS (${{ github.event.inputs.lane || (github.ref == 'refs/heads/main' && 'release' || 'beta') }})
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          working-directory: apps/mobile
          bundler-cache: true

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: apps/mobile/ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('apps/mobile/ios/Podfile.lock') }}
          restore-keys: pods-${{ runner.os }}-

      - name: Install CocoaPods
        working-directory: apps/mobile/ios
        run: pod install --repo-update

      - name: Deploy via Fastlane
        working-directory: apps/mobile/ios
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          ITC_TEAM_ID: ${{ secrets.ITC_TEAM_ID }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          if [ -n "${{ github.event.inputs.lane }}" ]; then
            LANE="${{ github.event.inputs.lane }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            LANE="release"
          else
            LANE="beta"
          fi
          bundle exec fastlane $LANE
