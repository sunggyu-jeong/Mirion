name: CI

on:
  pull_request:
    branches:
      - develop

jobs:
  test-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: forge test
        working-directory: apps/contracts
      - working-directory: apps/contracts
        run: |
          LINE_COV=$(forge coverage --report summary 2>&1 | grep "Total" | grep -oE '[0-9]+\.[0-9]+%' | head -1 | tr -d '%')
          LINE_COV=${LINE_COV%.*}
          echo "Line coverage: ${LINE_COV}%"
          if [ "${LINE_COV}" -lt 80 ]; then
            echo "::error::Line coverage ${LINE_COV}% is below the required 80%"
            exit 1
          fi

  test-mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @lockfi/mobile test:js:coverage
