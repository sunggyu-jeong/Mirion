name: LockFi Contract(TimeLock) CI/CD

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "apps/contracts/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
      
      - name: Install Dependencies
        working-directory: apps/contracts
        run: pnpm install
      
      - name: Run Tests
        working-directory: apps/contracts
        run: forge test -vv

  deploy-testnet:
    needs: test
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: LockFi
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
        
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Debug Environment Variables
        working-directory: apps/contracts
        env:
          RPC_URL: ${{ secrets.BASE_SEPOLIA_RPC_URL }}
          PRIVATE_KEY: ${{ secrets.TESTNET_DEPLOYER_PRIVATE_KEY }}
        run: |
          echo "--- Environment Check ---"
          echo "RPC_URL length: ${#RPC_URL}"
          echo "PRIVATE_KEY length: ${#PRIVATE_KEY}"
          
          if [ -n "$RPC_URL" ]; then
            echo "RPC_URL starts with: $(echo $RPC_URL | cut -c 1-5)..."
          else
            echo "RPC_URL is EMPTY!"
          fi
          echo "------------------------"
        
      - name: Deploy to Base Sepolia
        working-directory: apps/contracts
        env:
          RPC_URL: ${{ secrets.BASE_SEPOLIA_RPC_URL }}
          PRIVATE_KEY: ${{ secrets.TESTNET_DEPLOYER_PRIVATE_KEY }}
          BASESCAN_API_KEY: ${{ secrets.BASESCAN_API_KEY }}
        run: |
          forge script script/DeployTimeLock.s.sol \
            --rpc-url $RPC_URL \
            --private-key $PRIVATE_KEY \
            --broadcast --verify --etherscan-api-key $BASESCAN_API_KEY --slow

  deploy-production:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: LockFi
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
        
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Deploy to Base Mainnet
        working-directory: apps/contracts
        env:
          RPC_URL: ${{ secrets.BASE_MAINNET_RPC_URL }}
          PRIVATE_KEY: ${{ secrets.MAINNET_DEPLOYER_PRIVATE_KEY }}
          BASESCAN_API_KEY: ${{ secrets.BASESCAN_API_KEY }}
        run: |
          forge script script/DeployTimeLock.s.sol \
            --rpc-url $RPC_URL \
            --private-key $PRIVATE_KEY \
            --broadcast \
            --verify \
            --etherscan-api-key $BASESCAN_API_KEY \
            --slow